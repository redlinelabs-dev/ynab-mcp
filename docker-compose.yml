# Preferred deploy: prebuilt GHCR image behind a Tailscale sidecar that terminates
# HTTPS (required by OAuth) and exposes the server at https://${TS_HOSTNAME}.
# One directory per app: this file + a .env alongside it. See docs/DEPLOY.md.
#
#   .env keys: TS_HOSTNAME, TS_AUTHKEY, YNAB_CLIENT_ID, YNAB_CLIENT_SECRET,
#              ENCRYPTION_KEY, DATA_DIR
#
# The image is published by .github/workflows/docker-publish.yml. If the GHCR
# package is private, `docker login ghcr.io` on the host first (or make it public).

configs:
  ts-serve-ynab:
    content: |
      {
        "TCP": {"443": {"HTTPS": true}},
        "Web": {"${TS_HOSTNAME}:443": {
          "Handlers": {"/": {"Proxy": "http://127.0.0.1:8080"}}
        }},
        "AllowFunnel": {"${TS_HOSTNAME}:443": false}
      }

services:
  tailscale-ynab:
    image: tailscale/tailscale:latest
    container_name: tailscale-ynab
    hostname: ynab # → ynab.<your-tailnet>.ts.net  (must match TS_HOSTNAME)
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=false
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:41234
      - TS_AUTH_ONCE=true
    configs:
      - source: ts-serve-ynab
        target: /config/serve.json
    volumes:
      - ${DATA_DIR}/tailscale:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:41234/healthz"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  ynab-mcp:
    image: ghcr.io/redlinelabs-dev/ynab-mcp:latest
    # To build locally instead of pulling, replace `image:` above with one of:
    #   build: https://github.com/redlinelabs-dev/ynab-mcp.git#main   # from GitHub
    #   build: .                                                       # from a checkout
    container_name: ynab-mcp
    network_mode: service:tailscale-ynab # share the sidecar's network namespace
    depends_on:
      tailscale-ynab:
        condition: service_healthy
    environment:
      - PUBLIC_URL=https://${TS_HOSTNAME}
      - YNAB_CLIENT_ID=${YNAB_CLIENT_ID}
      - YNAB_CLIENT_SECRET=${YNAB_CLIENT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ${DATA_DIR}/data:/app/data
    restart: unless-stopped
