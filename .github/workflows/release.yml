name: Release

# release-please keeps versioning + CHANGELOG via Release PRs. The deploy artifact
# is a self-hosted Docker image (see docs/DEPLOY.md), NOT an npm package — the
# package is `private` and there is no npm publish step (ADR-0004).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
