name = "ynab-mcp"
main = "src/worker.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [{ name = "YnabMCP", class_name = "YnabMCP" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["YnabMCP"]

# Required secret — set via:
#   wrangler secret put YNAB_DEV_TOKEN
# Never commit the token value.
