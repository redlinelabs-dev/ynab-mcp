name = "ynab-mcp"
main = "src/worker.ts"
compatibility_date = "2025-03-07"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [{ name = "YnabMCP", class_name = "YnabMCP" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["YnabMCP"]

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "" # run: wrangler kv namespace create OAUTH_KV  →  paste the id here

# Secrets — set via wrangler secret put <NAME>:
#   YNAB_CLIENT_ID, YNAB_CLIENT_SECRET, YNAB_REDIRECT_URI, COOKIE_SECRET
# Dev-only escape hatch (bypasses OAuth):
#   YNAB_DEV_TOKEN
